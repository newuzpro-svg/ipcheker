<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Real IP Finder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== NETWORK CANVAS ===== */
    #netCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== LANGUAGE TOGGLE ===== */
    .lang-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 200;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 6px 14px;
      color: #c9d1d9;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.5px;
    }
    .lang-toggle:hover { background: #2d333b; border-color: #58a6ff60; color: #58a6ff; }

    /* ===== PIN SCREEN ===== */
    #pinScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #0d111799;
      backdrop-filter: blur(4px);
    }
    #pinScreen.hidden { display: none; }

    .pin-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 24px 80px #00000070, 0 0 0 1px #58a6ff12;
      animation: pinIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pinIn {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .pin-icon { font-size: 2.8rem; margin-bottom: 16px; filter: drop-shadow(0 0 16px #58a6ff60); }
    .pin-title { font-size: 1.3rem; font-weight: 700; color: #e6edf3; margin-bottom: 6px; }
    .pin-subtitle { font-size: 0.85rem; color: #6e7681; margin-bottom: 28px; }

    .pin-input-wrap { position: relative; margin-bottom: 16px; }
    .pin-input {
      width: 100%; padding: 14px 18px;
      font-size: 1.5rem; letter-spacing: 0.5em; text-align: center;
      background: #0d1117; border: 1.5px solid #30363d; border-radius: 12px;
      color: #e6edf3; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-text-security: disc;
    }
    .pin-input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px #58a6ff20; }
    .pin-input.error { border-color: #f85149; box-shadow: 0 0 0 3px #f8514920; animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      60%      { transform: translateX(8px); }
    }

    .pin-error { font-size: 0.82rem; color: #f85149; min-height: 20px; margin-bottom: 12px; }

    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .pad-btn {
      padding: 16px 10px; font-size: 1.2rem; font-weight: 600;
      background: #21262d; border: 1px solid #30363d; border-radius: 12px;
      color: #c9d1d9; cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .pad-btn:hover  { background: #2d333b; border-color: #58a6ff40; }
    .pad-btn:active { background: #58a6ff22; transform: scale(0.94); border-color: #58a6ff; }
    .pad-btn.zero   { grid-column: 2; }
    .pad-btn.del    { background: #1c2128; color: #8b949e; font-size: 1rem; }
    .pad-btn.del:hover  { background: #f8514920; color: #f85149; border-color: #f8514940; }

    .pin-submit {
      width: 100%; padding: 14px; font-size: 1rem; font-weight: 700;
      background: linear-gradient(135deg, #238636, #2ea043);
      border: none; border-radius: 12px; color: #fff; cursor: pointer;
      transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .pin-submit:hover  { background: linear-gradient(135deg, #2ea043, #3fb950); box-shadow: 0 4px 16px #23863650; }
    .pin-submit:active { transform: scale(0.97); }
    .pin-submit:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .pin-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #30363d; background: transparent; transition: all 0.2s;
    }
    .pin-dot.filled { background: #58a6ff; border-color: #58a6ff; box-shadow: 0 0 8px #58a6ff80; }

    /* ===== HERO ===== */
    #hero {
      position: relative; z-index: 1;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
      transition: min-height 0.5s ease, padding 0.5s ease;
    }

    h1 { font-size: clamp(1.6rem, 5vw, 2.4rem); color: #58a6ff; margin-bottom: 10px; letter-spacing: -0.5px; text-shadow: 0 0 40px #58a6ff40; }
    .subtitle { color: #8b949e; margin-bottom: 36px; font-size: clamp(0.82rem, 2.5vw, 0.95rem); max-width: 520px; }

    /* ===== SEARCH BOX ===== */
    .search-box {
      display: flex; gap: 0; width: 100%; max-width: 660px;
      background: #161b22cc; border: 1px solid #30363d; border-radius: 14px;
      padding: 5px; backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px #00000060, 0 0 0 1px #58a6ff0a;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .search-box:focus-within { border-color: #58a6ff55; box-shadow: 0 8px 40px #58a6ff18, 0 0 0 1px #58a6ff25; }
    #urlInput {
      flex: 1; padding: 13px 16px; background: transparent; border: none;
      color: #c9d1d9; font-size: 1rem; outline: none; min-width: 0;
    }
    #urlInput::placeholder { color: #484f58; }
    #searchBtn {
      padding: 13px 22px;
      background: linear-gradient(135deg, #238636, #2ea043);
      border: none; border-radius: 10px; color: #fff;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #searchBtn:hover    { background: linear-gradient(135deg, #2ea043, #3fb950); transform: translateY(-1px); box-shadow: 0 4px 16px #23863650; }
    #searchBtn:active   { transform: translateY(0); }
    #searchBtn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ===== MAIN CONTENT ===== */
    .main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }

    /* ===== LOADER ===== */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .loader { display: none; padding: 40px 16px; text-align: center; }
    .loader.active { display: block; animation: cardIn 0.3s ease; }

    .radar-wrap { position: relative; width: 100px; height: 100px; margin: 0 auto 24px; }
    .radar-ring {
      position: absolute; border-radius: 50%;
      border: 2px solid #58a6ff; opacity: 0;
      animation: radarPulse 2.4s ease-out infinite;
    }
    .radar-ring:nth-child(1) { inset: 34px; animation-delay: 0s; }
    .radar-ring:nth-child(2) { inset: 17px; animation-delay: 0.7s; }
    .radar-ring:nth-child(3) { inset: 0;    animation-delay: 1.4s; }
    @keyframes radarPulse { 0% { transform: scale(0.4); opacity: 0.9; } 100% { transform: scale(1); opacity: 0; } }
    .radar-core {
      position: absolute; inset: 37px;
      background: #58a6ff; border-radius: 50%;
      box-shadow: 0 0 12px #58a6ff, 0 0 28px #58a6ff60;
      animation: corePulse 1.2s ease-in-out infinite alternate;
    }
    @keyframes corePulse {
      from { box-shadow: 0 0 8px #58a6ff, 0 0 18px #58a6ff50; }
      to   { box-shadow: 0 0 16px #58a6ff, 0 0 36px #58a6ffaa; }
    }
    .loader-title { font-size: 1.05rem; color: #c9d1d9; font-weight: 600; margin-bottom: 20px; }
    .loader-title .dots { color: #58a6ff; }

    .scan-steps { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; max-width: 540px; margin: 0 auto; text-align: left; }
    @media(max-width: 500px) { .scan-steps { grid-template-columns: 1fr; } }

    .step-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 11px; border-radius: 8px;
      background: #161b22cc; border: 1px solid #21262d;
      font-size: 0.78rem; color: #484f58;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.3s, background 0.3s, color 0.3s;
      backdrop-filter: blur(8px);
    }
    .step-item.visible { opacity: 1; transform: translateY(0); color: #8b949e; }
    .step-item.active  { border-color: #58a6ff50; background: #58a6ff12; color: #58a6ff; }
    .step-item.done    { border-color: #23863650; background: #23863612; color: #3fb950; }
    .step-icon { font-size: 0.95rem; flex-shrink: 0; }
    .step-spinner { margin-left: auto; width: 11px; height: 11px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .step-check { margin-left: auto; color: #3fb950; font-size: 0.85rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== CARDS ===== */
    @keyframes shimmerLine { 0% { left: -60%; } 100% { left: 120%; } }
    .results { display: none; }
    .results.active { display: block; animation: cardIn 0.4s ease; }

    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 16px 18px; margin-bottom: 14px;
      position: relative; overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .card:hover { border-color: #58a6ff35; box-shadow: 0 0 24px #58a6ff0c; }
    .card::after {
      content: ''; position: absolute; top: 0; left: -60%;
      width: 40%; height: 1px;
      background: linear-gradient(90deg, transparent, #58a6ff60, transparent);
      animation: shimmerLine 4s linear infinite;
    }
    .card-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin-bottom: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .domain-name { font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: 700; color: #e6edf3; word-break: break-all; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; margin-left: 8px; vertical-align: middle; }
    .badge-cf    { background: #f6821015; color: #f68210; border: 1px solid #f6821045; }
    .badge-aws   { background: #ff990015; color: #ff9900; border: 1px solid #ff990045; }
    .badge-clean { background: #23863615; color: #2ea043; border: 1px solid #23863645; }

    .ip-list { list-style: none; }
    .ip-list li { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; padding: 9px 0; border-bottom: 1px solid #21262d; }
    .ip-list li:last-child { border-bottom: none; }
    .ip-flag  { font-size: 1.1rem; flex-shrink: 0; }
    .ip-addr  { font-size: clamp(0.9rem, 3vw, 1.05rem); color: #79c0ff; font-weight: 700; font-family: 'Courier New', monospace; min-width: 130px; word-break: break-all; }
    .ip-addr.highlight { color: #3fb950; }
    .ip-geo   { font-size: 0.78rem; color: #8b949e; display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 100px; }
    .ip-geo-country { color: #c9d1d9; font-weight: 500; }
    .ip-geo-org     { color: #6e7681; font-size: 0.72rem; }
    .ip-source { font-size: 0.72rem; color: #6e7681; font-family: monospace; flex-basis: 100%; padding-left: 26px; margin-top: -4px; word-break: break-all; }
    .ip-tag { font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; font-weight: 700; flex-shrink: 0; }
    .tag-cf   { background: #f6821020; color: #f68210; }
    .tag-aws  { background: #ff990020; color: #ff9900; }
    .tag-real { background: #23863620; color: #3fb950; }
    .method-badge { font-size: 0.62rem; padding: 1px 5px; border-radius: 3px; background: #21262d; color: #6e7681; font-family: monospace; }

    .shodan-box { margin-top: 5px; margin-left: 26px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .shodan-port { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #1f2937; color: #60a5fa; border: 1px solid #2d3f56; font-family: monospace; }
    .shodan-host { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #1a2420; color: #4ade80; border: 1px solid #2a3e30; font-family: monospace; }
    .shodan-vuln { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #2a1a1a; color: #f87171; border: 1px solid #3e2222; font-family: monospace; }

    .header-row { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid #21262d; font-size: 0.82rem; flex-wrap: wrap; }
    .header-row:last-child { border-bottom: none; }
    .header-key { color: #f78166; font-family: monospace; min-width: 160px; flex-shrink: 0; }
    .header-val { color: #a5d6ff; font-family: monospace; word-break: break-all; flex: 1; }

    .alert { padding: 12px 15px; border-radius: 9px; margin-bottom: 14px; font-size: 0.88rem; line-height: 1.5; }
    .alert-warning { background: #f6821010; border: 1px solid #f6821045; color: #f68210; }
    .alert-info    { background: #58a6ff10; border: 1px solid #58a6ff35; color: #58a6ff; }
    .alert-error   { background: #f8514920; border: 1px solid #f8514945; color: #f85149; }
    .no-results    { color: #484f58; font-style: italic; font-size: 0.88rem; }

    .methods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .method-card { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 9px 12px; font-size: 0.78rem; color: #8b949e; line-height: 1.5; }
    .method-card strong { color: #c9d1d9; display: block; margin-bottom: 2px; }

    /* ===== PDF BUTTON ===== */
    .pdf-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border: none; border-radius: 10px; color: #fff;
      font-size: 0.92rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s; margin-bottom: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    .pdf-btn:hover  { transform: translateY(-1px); box-shadow: 0 4px 20px #1f6feb60; }
    .pdf-btn:active { transform: translateY(0); }

    /* ===== PRINT STYLES (Save as PDF) ===== */
    @media print {
      body { background: white !important; color: black !important; }
      #netCanvas, #pinScreen, .lang-toggle, #hero, .loader { display: none !important; }
      .results { display: block !important; }
      .pdf-btn { display: none !important; }
      .card { border: 1px solid #ccc !important; background: white !important; page-break-inside: avoid; margin-bottom: 12px !important; }
      .card-title { color: #555 !important; }
      .ip-addr { color: #0066cc !important; }
      .ip-addr.highlight { color: #006600 !important; }
      .ip-geo-country { color: #333 !important; }
      .ip-geo-org { color: #666 !important; }
      .header-key { color: #cc3300 !important; }
      .header-val { color: #003399 !important; }
      .badge-cf { background: #fff3e0 !important; color: #e65100 !important; border: 1px solid #e65100 !important; }
      .badge-aws { background: #fff8e1 !important; color: #f57f17 !important; border: 1px solid #f57f17 !important; }
      .badge-clean { background: #e8f5e9 !important; color: #2e7d32 !important; border: 1px solid #2e7d32 !important; }
      .alert-warning { background: #fff3e0 !important; color: #e65100 !important; border: 1px solid #f68210 !important; }
      .domain-name { color: #111 !important; }
      .method-card { background: #f5f5f5 !important; border: 1px solid #ddd !important; color: #555 !important; }
      .method-card strong { color: #222 !important; }
      .shodan-port { background: #e8f0ff !important; color: #1a56db !important; border: 1px solid #93c5fd !important; }
      .shodan-host { background: #ecfdf5 !important; color: #065f46 !important; border: 1px solid #6ee7b7 !important; }
      .shodan-vuln { background: #fef2f2 !important; color: #991b1b !important; border: 1px solid #fca5a5 !important; }
      .main { padding: 20px !important; max-width: 100% !important; }
      .card::after { display: none !important; }
    }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      .pin-card { padding: 28px 20px; }
      .pad-btn  { padding: 14px 8px; font-size: 1.1rem; }
      .search-box { border-radius: 12px; }
      #urlInput { padding: 12px 12px; }
      #searchBtn { padding: 12px 14px; font-size: 0.88rem; }
      .card { padding: 13px 14px; }
      .methods-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<canvas id="netCanvas"></canvas>

<!-- Language toggle -->
<button class="lang-toggle" id="langBtn" onclick="toggleLang()">RU</button>

<!-- PIN Screen -->
<div id="pinScreen">
  <div class="pin-card">
    <div class="pin-icon">🔐</div>
    <div class="pin-title" data-i18n="pinTitle">Kirish uchun PIN</div>
    <div class="pin-subtitle" data-i18n="pinSubtitle">Real IP Finder — maxfiy panel</div>

    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="pin-error" id="pinError"></div>

    <div class="pin-pad">
      <button class="pad-btn" onclick="padPress('1')">1</button>
      <button class="pad-btn" onclick="padPress('2')">2</button>
      <button class="pad-btn" onclick="padPress('3')">3</button>
      <button class="pad-btn" onclick="padPress('4')">4</button>
      <button class="pad-btn" onclick="padPress('5')">5</button>
      <button class="pad-btn" onclick="padPress('6')">6</button>
      <button class="pad-btn" onclick="padPress('7')">7</button>
      <button class="pad-btn" onclick="padPress('8')">8</button>
      <button class="pad-btn" onclick="padPress('9')">9</button>
      <button class="pad-btn zero" onclick="padPress('0')">0</button>
      <button class="pad-btn del" onclick="padDel()">⌫</button>
    </div>

    <button class="pin-submit" id="pinSubmit" onclick="submitPin()" disabled data-i18n="pinSubmit">Kirish</button>
  </div>
</div>

<!-- Main App -->
<div id="hero">
  <h1 data-i18n="h1">🔍 Real IP Finder</h1>
  <p class="subtitle" data-i18n="subtitle">Cloudflare, AWS va boshqa himoyalar orqasidagi haqiqiy server IP manzilini aniqlang</p>
  <div class="search-box">
    <input type="text" id="urlInput"
      placeholder="example.com yoki https://example.com"
      data-i18n-placeholder="placeholder"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button id="searchBtn" onclick="lookup()" data-i18n="searchBtn">Tekshir</button>
  </div>
</div>

<div class="main">
  <div class="loader" id="loader">
    <div class="radar-wrap">
      <div class="radar-ring"></div>
      <div class="radar-ring"></div>
      <div class="radar-ring"></div>
      <div class="radar-core"></div>
    </div>
    <div class="loader-title"><span id="analyzingText" data-i18n="analyzing">Tahlil qilinmoqda</span><span class="dots"></span></div>
    <div class="scan-steps" id="scanSteps"></div>
  </div>
  <div class="results" id="results"></div>
</div>

<script>
/* ============================================================
   TRANSLATIONS
   ============================================================ */
const TRANSLATIONS = {
  uz: {
    pinTitle:     "Kirish uchun PIN",
    pinSubtitle:  "Real IP Finder — maxfiy panel",
    pinSubmit:    "Kirish",
    pinChecking:  "Tekshirilmoqda...",
    connError:    "Server bilan bog'lanib bo'lmadi",
    wrongPin:     "Noto'g'ri PIN",
    h1:           "🔍 Real IP Finder",
    subtitle:     "Cloudflare, AWS va boshqa himoyalar orqasidagi haqiqiy server IP manzilini aniqlang",
    placeholder:  "example.com yoki https://example.com",
    searchBtn:    "Tekshir",
    analyzing:    "Tahlil qilinmoqda",
    // Steps
    step0:  "DNS A/AAAA yozuvlari",
    step1:  "Cloudflare / AWS tekshiruvi",
    step2:  "MX — pochta serverlari",
    step3:  "SPF / TXT / DMARC",
    step4:  "NS / SOA / SRV yozuvlari",
    step5:  "SSL sertifikat (crt.sh)",
    step6:  "AlienVault OTX passiv DNS",
    step7:  "URLScan.io ma'lumotlar bazasi",
    step8:  "HackerTarget + RapidDNS",
    step9:  "Subdomain brute-force (80+)",
    step10: "ViewDNS IP tarixi",
    step11: "Shodan InternetDB",
    step12: "IP Geolokatsiya",
    // Results
    cardDomain:    "🌐 Domain",

/* ============================================================
   NETWORK CANVAS ANIMATION
   ============================================================ */
(function () {
  const canvas = document.getElementById('netCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, nodes, pings;
  const NODE_COUNT    = 50;
  const MAX_DIST      = 150;
  const PING_INTERVAL = 900;

  function resize() {
    W = canvas.width  = canvas.clientWidth  || window.innerWidth;
    H = canvas.height = canvas.clientHeight || window.innerHeight;
  }
  function randNode() {
    return {
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: 1.5 + Math.random() * 2.5,
      hub: Math.random() < 0.15,
      phase: Math.random() * Math.PI * 2,
    };
  }
  function init() { resize(); nodes = Array.from({ length: NODE_COUNT }, randNode); pings = []; }

  function getEdges() {
    const e = [];
    for (let i = 0; i < nodes.length; i++)
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < MAX_DIST) e.push({ a: i, b: j, d });
      }
    return e;
  }

  let lastPing = 0;
  function spawnPing(edges) {
    if (!edges.length) return;
    const edge = edges[Math.floor(Math.random() * edges.length)];
    const [from, to] = Math.random() < 0.5 ? [edge.a, edge.b] : [edge.b, edge.a];
    pings.push({ from, to, t: 0, speed: 0.006 + Math.random() * 0.008 });
  }

  function draw(ts) {
    ctx.clearRect(0, 0, W, H);
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < -10) n.x = W + 10; if (n.x > W + 10) n.x = -10;
      if (n.y < -10) n.y = H + 10; if (n.y > H + 10) n.y = -10;
      n.phase += 0.025;
    });

    const edges = getEdges();
    if (ts - lastPing > PING_INTERVAL) { spawnPing(edges); lastPing = ts; }

    edges.forEach(({ a, b, d }) => {
      ctx.beginPath();
      ctx.moveTo(nodes[a].x, nodes[a].y);
      ctx.lineTo(nodes[b].x, nodes[b].y);
      ctx.strokeStyle = `rgba(88,166,255,${(1 - d / MAX_DIST) * 0.2})`;
      ctx.lineWidth = 1; ctx.stroke();
    });

    nodes.forEach(n => {
      const r = n.size * (n.hub ? 1 + 0.35 * Math.sin(n.phase) : 1);
      if (n.hub) {
        ctx.beginPath(); ctx.arc(n.x, n.y, r * 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(88,166,255,0.04)'; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = n.hub ? 'rgba(88,166,255,0.85)' : 'rgba(88,166,255,0.5)';
      ctx.fill();
    });

    pings = pings.filter(p => {
      p.t += p.speed;
      if (p.t >= 1) return false;
      const from = nodes[p.from], to = nodes[p.to];
      const px = from.x + (to.x - from.x) * p.t;
      const py = from.y + (to.y - from.y) * p.t;
      const tx = from.x + (to.x - from.x) * Math.max(0, p.t - 0.12);
      const ty = from.y + (to.y - from.y) * Math.max(0, p.t - 0.12);
      const grad = ctx.createLinearGradient(tx, ty, px, py);
      grad.addColorStop(0, 'rgba(63,185,80,0)');
      grad.addColorStop(1, 'rgba(63,185,80,0.85)');
      ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(px, py);
      ctx.strokeStyle = grad; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#3fb950';
      ctx.shadowColor = '#3fb950'; ctx.shadowBlur = 8;
      ctx.fill(); ctx.shadowBlur = 0;
      return true;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  requestAnimationFrame(draw);
})();

/* ============================================================
   PIN AUTH
   ============================================================ */
let pinValue = '';
let authToken = sessionStorage.getItem('auth_token') || '';

if (authToken) {
  document.getElementById('pinScreen').classList.add('hidden');
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinValue.length);
  }
  document.getElementById('pinSubmit').disabled = pinValue.length < 4;
}

function padPress(digit) {
  if (pinValue.length >= 4) return;
  pinValue += digit;
  updateDots();
  document.getElementById('pinError').textContent = '';
  if (pinValue.length === 4) submitPin();
}

function padDel() {
  pinValue = pinValue.slice(0, -1);
  updateDots();
  document.getElementById('pinError').textContent = '';
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pinScreen').classList.contains('hidden')) return;
  if (e.key >= '0' && e.key <= '9') padPress(e.key);
  else if (e.key === 'Backspace') padDel();
  else if (e.key === 'Enter' && pinValue.length === 4) submitPin();
});

async function submitPin() {
  if (pinValue.length < 4) return;
  const btn = document.getElementById('pinSubmit');
  btn.disabled = true;
  btn.textContent = t('pinChecking');

  try {
    const res  = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pinValue })
    });
    const data = await res.json();

    if (res.ok && data.token) {
      authToken = data.token;
      sessionStorage.setItem('auth_token', authToken);
      const ps = document.getElementById('pinScreen');
      ps.style.transition = 'opacity 0.4s';
      ps.style.opacity = '0';
      setTimeout(() => ps.classList.add('hidden'), 400);
    } else {
      showPinError(data.error || t('wrongPin'));
    }
  } catch {
    showPinError(t('connError'));
  } finally {
    btn.disabled = false;
    btn.textContent = t('pinSubmit');
  }
}

function showPinError(msg) {
  document.getElementById('pinError').textContent = msg;
  pinValue = '';
  updateDots();
  document.querySelectorAll('.pin-dot').forEach(d => {
    d.style.borderColor = '#f85149';
    d.style.background  = 'transparent';
  });
  setTimeout(() => {
    document.querySelectorAll('.pin-dot').forEach(d => {
      d.style.borderColor = '';
      d.style.background  = '';
    });
  }, 600);
}

const STEP_META = [
  { icon: '🌐', delay: 0 },
  { icon: '🛡️', delay: 500 },
  { icon: '📧', delay: 1100 },
  { icon: '📋', delay: 1800 },
  { icon: '🗄️', delay: 2600 },
  { icon: '🔐', delay: 3600 },
  { icon: '👁️', delay: 4900 },
  { icon: '📡', delay: 6200 },
  { icon: '🎯', delay: 7400 },
  { icon: '⚡', delay: 8800 },
  { icon: '📖', delay: 10200 },
  { icon: '🔦', delay: 11600 },
  { icon: '🌍', delay: 12800 },
];

let stepTimers = [], dotTimer = null, stepEls = [];

function startLoader() {
  const container = document.getElementById('scanSteps');
  container.innerHTML = '';
  stepEls = [];
  for (let i = 0; i < STEP_META.length; i++) {
    const el = document.createElement('div');
    el.className = 'step-item';
    el.innerHTML = `<span class="step-icon">${STEP_META[i].icon}</span><span>${t('step' + i)}</span>`;
    container.appendChild(el);
    stepEls.push(el);
  }
  stepTimers = [];
  STEP_META.forEach((s, i) => {
    stepTimers.push(setTimeout(() => {
      stepEls[i].classList.add('visible', 'active');
      stepEls[i].innerHTML += `<span class="step-spinner"></span>`;
      if (i > 0) markDone(i - 1);
    }, s.delay));
  });
  let dotCount = 0;
  dotTimer = setInterval(() => {
    dotCount = (dotCount % 3) + 1;
    const el = document.querySelector('.dots');
    if (el) el.textContent = '.'.repeat(dotCount);
  }, 450);
}

function markDone(i) {
  if (!stepEls[i]) return;
  stepEls[i].classList.remove('active');
  stepEls[i].classList.add('done');
  const spinner = stepEls[i].querySelector('.step-spinner');
  if (spinner) spinner.outerHTML = '<span class="step-check">✓</span>';
}

function stopLoader() {
  stepTimers.forEach(clearTimeout); stepTimers = [];
  clearInterval(dotTimer);
  stepEls.forEach((_, i) => markDone(i));
}

   MAIN LOOKUP
   ============================================================ */
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});

async function lookup() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const btn     = document.getElementById('searchBtn');
  const loader  = document.getElementById('loader');
  const results = document.getElementById('results');
  const hero    = document.getElementById('hero');

  btn.disabled = true;
  loader.classList.add('active');
  results.classList.remove('active');
  results.innerHTML = '';
  lastData = null;
  startLoader();

  hero.style.minHeight = '22vh';
  hero.style.paddingTop = '28px';
  hero.style.paddingBottom = '20px';
  setTimeout(() => loader.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

  try {
    const res = await fetch('/api/lookup', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-auth-token': authToken
      },
      body: JSON.stringify({ url })
    });

    if (res.status === 401) {
      sessionStorage.removeItem('auth_token');
      authToken = '';
      document.getElementById('pinScreen').classList.remove('hidden');
      document.getElementById('pinScreen').style.opacity = '1';
      stopLoader();
      loader.classList.remove('active');
      btn.disabled = false;
      return;
    }

    const data = await res.json();
    stopLoader();
    setTimeout(() => {
      loader.classList.remove('active');
      renderResults(data);
    }, 600);
  } catch (err) {
    stopLoader();
    loader.classList.remove('active');
    results.innerHTML = `<div class="alert alert-error">${t('errPrefix')}: ${esc(err.message)}</div>`;
    results.classList.add('active');
  } finally {
    btn.disabled = false;
  }
}

   ============================================================ */
function flagEmoji(code) {
  if (!code || code.length !== 2) return '🌐';
  const o = 0x1F1E6 - 65;
  return String.fromCodePoint(code.toUpperCase().charCodeAt(0) + o, code.toUpperCase().charCodeAt(1) + o);
}

function geoLine(geo) {
  if (!geo) return '';
  const flag = flagEmoji(geo.countryCode);
  const loc  = [geo.city, geo.country].filter(Boolean).join(', ');
  return `<div class="ip-geo">
    <span class="ip-geo-country">${flag} ${esc(loc || '—')}</span>
    <span class="ip-geo-org">${esc(geo.org || geo.isp || '')}</span>
  </div>`;
}

function shodanLine(shodanData, ip) {
  const s = shodanData && shodanData[ip];
  if (!s) return '';
  const ports = (s.ports || []).slice(0, 12).map(p => `<span class="shodan-port">${p}</span>`).join('');
  const hosts = (s.hostnames || []).slice(0, 4).map(h => `<span class="shodan-host">${esc(h)}</span>`).join('');
  const vulns = (s.vulns || []).slice(0, 3).map(v => `<span class="shodan-vuln">${esc(v)}</span>`).join('');
  if (!ports && !hosts && !vulns) return '';
  return `<div class="shodan-box">${ports}${hosts}${vulns}</div>`;
}

function renderResults(data) {
  lastData = data;
  const results = document.getElementById('results');
  let html = '';

  // PDF download button
  html += `<button class="pdf-btn" onclick="downloadPDF()">${t('downloadPDF')}</button>`;

  if (data.error) html += `<div class="alert alert-error">${t('errPrefix')}: ${esc(data.error)}</div>`;

  const badgeHtml = data.protection.cloudflare
    ? `<span class="badge badge-cf">☁️ Cloudflare</span>`
    : data.protection.aws
    ? `<span class="badge badge-aws">☁️ AWS</span>`
    : `<span class="badge badge-clean">${t('badgeDirect')}</span>`;

  html += `<div class="card">
    <div class="card-title">${t('cardDomain')}</div>
    <div class="domain-name">${esc(data.domain)} ${badgeHtml}</div>
  </div>`;

  html += `<div class="card"><div class="card-title">${t('cardMainIP')}</div>`;
  if (!data.mainIPs.length) {
    html += `<span class="no-results">${t('noIP')}</span>`;
  } else {
    html += `<ul class="ip-list">`;
    for (const ip of data.mainIPs) {
      const geo  = data.geoData && data.geoData[ip];
      const flag = geo ? flagEmoji(geo.countryCode) : '🌐';
      const tag  = data.protection.cloudflare
        ? `<span class="ip-tag tag-cf">Cloudflare</span>`
        : data.protection.aws
        ? `<span class="ip-tag tag-aws">AWS</span>`
        : `<span class="ip-tag tag-real">Real</span>`;

        }
        html += `</ul>`;
      }
      if (otherCandidates.length) {

        for (const c of otherCandidates) {
          const geo = data.geoData && data.geoData[c.ip];
          const tag = c.isCF
            ? `<span class="ip-tag tag-cf">Cloudflare</span>`

          const sources = c.sources ? c.sources : [c.source];
          html += `<li>

            <span class="ip-addr">${esc(c.ip)}</span>

    html += `</div>`;
  }

  if (Object.keys(data.headers).length) {
    html += `<div class="card"><div class="card-title">${t('cardHeaders')}</div>`;

    }

  }

  html += `<div class="card">
    <div class="card-title">${t('cardMethods')}</div>
    <div class="methods-grid">
      <div class="method-card"><strong>DNS A/AAAA</strong>Asosiy IP manzil</div>
      <div class="method-card"><strong>MX yozuvlari</strong>Pochta serveri IP</div>
      <div class="method-card"><strong>SPF / TXT</strong>ip4: ko'rinishidagi IP</div>

      <div class="method-card"><strong>ip-api.com</strong>Geo, ISP</div>

  results.classList.add('active');

/* ============================================================
   PDF GENERATION
   ============================================================ */
function downloadPDF() {
  if (!lastData) return;
  if (!window.jspdf) {
    alert('jsPDF yuklanmadi. Sahifani yangilang.');
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const margin     = 15;
  const pageWidth  = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const maxWidth   = pageWidth - margin * 2;
  let y = 20;

  function checkPage(needed) {
    if (y + (needed || 8) > pageHeight - 15) { doc.addPage(); y = 20; }
  }

  function sectionTitle(text) {
    checkPage(14);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(30, 90, 200);
    doc.text(text, margin, y);
    y += 2;
    doc.setDrawColor(30, 90, 200);
    doc.setLineWidth(0.4);
    doc.line(margin, y, margin + maxWidth, y);
    y += 7;
    doc.setTextColor(0, 0, 0);
  }

  function bodyText(text, indent) {
    const lines = doc.splitTextToSize(text, maxWidth - (indent || 0));
    for (const l of lines) {
      checkPage(6);
      doc.text(l, margin + (indent || 0), y);
      y += 6;
    }
  }

  // ---- Header ----
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(20);
  doc.setTextColor(30, 90, 200);
  doc.text('Real IP Finder', margin, y);
  y += 8;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(100);
  const dateStr = new Date().toLocaleString(currentLang === 'ru' ? 'ru-RU' : 'uz-UZ');
  doc.text(`Report generated: ${dateStr}`, margin, y);
  y += 5;
  doc.setDrawColor(200);
  doc.setLineWidth(0.3);
  doc.line(margin, y, margin + maxWidth, y);
  y += 10;

  // ---- Domain & Protection ----
  sectionTitle('Domain & Protection');

  doc.setFontSize(11);
  doc.setTextColor(0);
  doc.setFont('helvetica', 'bold');
  doc.text('Domain:', margin, y);
  doc.setFont('helvetica', 'normal');
  doc.text(lastData.domain || '-', margin + 28, y);
  y += 7;

  doc.setFont('helvetica', 'bold');
  doc.text('Protection:', margin, y);
  doc.setFont('helvetica', 'normal');
  const prot = lastData.protection?.name || 'Direct (no proxy)';
  doc.text(prot, margin + 32, y);
  y += 10;

  // ---- Main IPs ----
  sectionTitle('Main IPs (DNS A/AAAA)');
  doc.setFontSize(10);

  if (lastData.mainIPs && lastData.mainIPs.length) {
    for (const ip of lastData.mainIPs) {
      const geo = lastData.geoData && lastData.geoData[ip];
      let line = `• ${ip}`;
      if (geo) {
        const loc = [geo.city, geo.country].filter(Boolean).join(', ');
        if (loc) line += `   (${loc})`;
        if (geo.org) line += `   ${geo.org}`;
      }
      bodyText(line, 2);
    }
  } else {
    bodyText('• None found', 2);
  }
  y += 4;

  // ---- Real IP Candidates ----
  const realCandidates  = (lastData.realIPCandidates || []).filter(c => c.likely);
  const otherCandidates = (lastData.realIPCandidates || []).filter(c => !c.likely);

  if (realCandidates.length) {
    sectionTitle(`Likely Real IPs (${realCandidates.length})`);
    doc.setFontSize(10);
    for (const c of realCandidates) {
      const geo = lastData.geoData && lastData.geoData[c.ip];
      let line = `• ${c.ip}  [${c.method || 'unknown'}]`;
      if (geo) {
        const loc = [geo.city, geo.country].filter(Boolean).join(', ');
        if (loc) line += `   ${loc}`;
      }
      bodyText(line, 2);
      // Sources
      const sources = c.sources || [c.source];
      bodyText(`  Source: ${sources.join(' | ')}`, 4);

      // Shodan data
      const s = lastData.shodanData && lastData.shodanData[c.ip];
      if (s) {
        if (s.ports?.length)     bodyText(`  Ports: ${s.ports.join(', ')}`, 4);
        if (s.hostnames?.length) bodyText(`  Hostnames: ${s.hostnames.join(', ')}`, 4);
        if (s.vulns?.length)     bodyText(`  Vulnerabilities: ${s.vulns.join(', ')}`, 4);
      }
      y += 2;
    }
    y += 2;
  }

  if (otherCandidates.length) {
    sectionTitle(`Other IPs / Proxy / CDN (${otherCandidates.length})`);
    doc.setFontSize(10);
    for (const c of otherCandidates) {
      const tag = c.isCF ? '[Cloudflare]' : c.isAWS ? '[AWS]' : '[CDN]';
      bodyText(`• ${c.ip}  ${tag}  [${c.method || ''}]`, 2);
    }
    y += 4;
  }

  // ---- HTTP Headers ----
  const headers = lastData.headers || {};
  if (Object.keys(headers).length) {
    sectionTitle('HTTP Response Headers');
    doc.setFontSize(10);
    for (const [k, v] of Object.entries(headers)) {
      const lines = doc.splitTextToSize(`${k}: ${v}`, maxWidth - 4);
      for (const l of lines) {
        checkPage(6);
        doc.text(l, margin + 2, y);
        y += 6;
      }
    }
    y += 4;
  }

  // ---- Methods ----
  sectionTitle('Methods Used');
  doc.setFontSize(9);
  const methods = [
    'DNS A/AAAA', 'MX records', 'SPF/TXT (ip4:)', 'NS/SOA records',
    'SRV records (SIP, SMTP, IMAP)', 'DMARC reporting domain',
    'crt.sh SSL certificate transparency', 'AlienVault OTX passive DNS',
    'URLScan.io database', 'HackerTarget subdomain API',
    'RapidDNS', 'ViewDNS IP history', 'Subdomain brute-force (80+ names)',
    'Shodan InternetDB', 'ip-api.com geolocation'
  ];
  for (let i = 0; i < methods.length; i += 2) {
    checkPage(6);
    const col1 = `• ${methods[i]}`;
    const col2 = methods[i + 1] ? `• ${methods[i + 1]}` : '';
    doc.text(col1, margin + 2, y);
    if (col2) doc.text(col2, margin + maxWidth / 2, y);
    y += 6;
  }

  // ---- Footer ----
  const totalPages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text(`Real IP Finder — Page ${i} / ${totalPages}`, margin, pageHeight - 8);
    doc.text(`${lastData.domain || ''}`, pageWidth - margin, pageHeight - 8, { align: 'right' });
  }

  doc.save(`${lastData.domain || 'report'}-ip-report.pdf`);
}

/* ============================================================
   HELPERS
   ============================================================ */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
